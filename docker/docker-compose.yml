# PostgreSQL + REST API za StartLine (Android → NAS).
# Pokretanje: cijeli ovaj folder na NAS, zatim vidi README.md

services:
  db:
    image: postgres:16-alpine
    container_name: startline-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-startline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Uredi .env — POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-startline}
    volumes:
      - startline_pgdata:/var/lib/postgresql/data
    # DBeaver s LAN-a: NAS_IP + lijevi port (15432). 5432 na DSM-u je često zauzet — zato ne 5432:5432.
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: startline-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Lozinka se u Pythonu URL-enkodira (znakovi @ : # / u lozinci inače lome DATABASE_URL)
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-startline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Uredi .env — POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-startline}
      API_KEY: ${API_KEY:?Uredi .env — API_KEY}
    # Fiksni port radi pouzdanosti na Synology DSM (izbjegava prazan "docker port" zbog ${VAR}).
    # Za drugi vanjski port promijeni lijevi broj (npr. 18080:8000).
    ports:
      - "8080:8000"

volumes:
  startline_pgdata:
